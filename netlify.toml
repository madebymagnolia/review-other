# Netlify configuration for a plain static site.
# The whole repo root is published as-is; there is no build step.
[build]
  publish = "."
  command = ""

# Long-cache the photos (they never change); keep HTML fresh.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
